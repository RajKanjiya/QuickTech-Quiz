<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login/SignUp</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="/SCSS/style.scss" rel="stylesheet">
</head>
<body class="no-select">
<div class="login__container">

    <div class="login__box">
        <!--        <div class="login__box__img">-->

        <!--        </div>-->

        <div class="login__box__frm">
            <div class="tabs">
                <div class="btn--active" id="loginDiv">
                    <button class="form__btn" id="login">Login</button>
                </div>
                <div class="" id="signUpDiv">
                    <button class="form__btn" id="signUp">Sign Up</button>
                </div>
            </div>

            <div class="forms">

                <form class="loginForm active" method="post" name="loginForm">
                    <input id="loginEmail" name="loginEmail" placeholder="Email" required type="text">
                    <div class="passShowHide">
                        <input id="loginPass" name="loginPass" placeholder="Password"
                               required
                               type="password">
                        <svg class="svg-pass" data-show="loginPass" fill="none" height="20px" id="loginPassShowHide"
                             viewBox="0 0 24 24"
                             width="20px"
                             xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 16.01C14.2091 16.01 16 14.2191 16 12.01C16 9.80087 14.2091 8.01001 12 8.01001C9.79086 8.01001 8 9.80087 8 12.01C8 14.2191 9.79086 16.01 12 16.01Z"
                                  stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/>
                            <path d="M2 11.98C8.09 1.31996 15.91 1.32996 22 11.98" stroke="#000000"
                                  stroke-linecap="round"
                                  stroke-linejoin="round" stroke-width="1.5"/>
                            <path d="M22 12.01C15.91 22.67 8.09 22.66 2 12.01" stroke="#000000" stroke-linecap="round"
                                  stroke-linejoin="round" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <span class="errorSpan hidden" id="loginError">Invalid Email or Password</span>
                    <button class="loginBtn" type="submit">Login</button>
                </form>

                <form class="signUpForm" name="signUpForm">
                    <div id="fullName">
                        <input id="signupFname" placeholder="First Name" required type="text">
                        <input id="signupLname" placeholder="Last Name" required type="text">
                    </div>
                    <input id="signupUsername" placeholder="User Name" required type="text">
                    <input id="signupEmail" placeholder="Email" required type="text">
                    <div class="passShowHide">
                        <input id="signupPass" name="loginPass" placeholder="Password" required type="password">
                        <svg class="svg-pass" data-show="signupPass" fill="none" height="20px" id="loginPassShowHide"
                             viewBox="0 0 24 24"
                             width="20px"
                             xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 16.01C14.2091 16.01 16 14.2191 16 12.01C16 9.80087 14.2091 8.01001 12 8.01001C9.79086 8.01001 8 9.80087 8 12.01C8 14.2191 9.79086 16.01 12 16.01Z"
                                  stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/>
                            <path d="M2 11.98C8.09 1.31996 15.91 1.32996 22 11.98" stroke="#000000"
                                  stroke-linecap="round"
                                  stroke-linejoin="round" stroke-width="1.5"/>
                            <path d="M22 12.01C15.91 22.67 8.09 22.66 2 12.01" stroke="#000000" stroke-linecap="round"
                                  stroke-linejoin="round" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <div class="passShowHide">
                        <input id="signupConPass" name="loginPass" placeholder="Confirm Password" required
                               type="password">
                        <svg class="svg-pass" data-show="signupConPass" fill="none" height="20px" id="loginPassShowHide"
                             viewBox="0 0 24 24"
                             width="20px"
                             xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 16.01C14.2091 16.01 16 14.2191 16 12.01C16 9.80087 14.2091 8.01001 12 8.01001C9.79086 8.01001 8 9.80087 8 12.01C8 14.2191 9.79086 16.01 12 16.01Z"
                                  stroke="#000000" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/>
                            <path d="M2 11.98C8.09 1.31996 15.91 1.32996 22 11.98" stroke="#000000"
                                  stroke-linecap="round"
                                  stroke-linejoin="round" stroke-width="1.5"/>
                            <path d="M22 12.01C15.91 22.67 8.09 22.66 2 12.01" stroke="#000000" stroke-linecap="round"
                                  stroke-linejoin="round" stroke-width="1.5"/>
                        </svg>
                    </div>
                    <span class="errorSpan hidden" id="signUpError">Please enter valid Email and Password</span>
                    <button class="signUpBtn" type="submit">Sign Up</button>
                </form>
            </div>

        </div>
    </div>

</div>

<script src="/TS/auth/login.ts" type="module"></script>
</body>
</html>
